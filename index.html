<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>8G Grimoire</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at top, #05000a, #000);
  color: white;
  text-align: center;
  overflow-x: hidden;
}

/* 🌌 BINTANG */
body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 200%;
  background: url('https://www.transparenttextures.com/patterns/stardust.png');
  opacity: 0.3;
  z-index: -2;
  animation: moveBg 120s linear infinite;
}

@keyframes moveBg {
  from { transform: translateY(0); }
  to { transform: translateY(-1000px); }
}

/* 🌙 BULAN */
.moon {
  position: fixed;
  top: 20px;
  right: 20px;
  width: 120px;
  opacity: 0.8;
  z-index: -1;
}

/* 🌳 POHON */
.tree {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 220px;
  opacity: 0.5;
}

/* 🌫️ KABUT */
.smoke {
  position: fixed;
  bottom: 0;
  right: 0;
  width: 300px;
  opacity: 0.4;
  animation: smokeMove 12s infinite;
}

@keyframes smokeMove {
  0% { transform: translateY(0); }
  50% { transform: translateY(-40px); }
  100% { transform: translateY(0); }
}

/* ✨ JUDUL */
h1 {
  margin-top: 20px;
  font-size: 28px;
  color: #d8aaff;
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 10px #a855f7; }
  to { text-shadow: 0 0 40px #ff00ff; }
}

/* 📦 GRID */
.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
  gap: 10px;
  padding: 15px;
}

/* 🧾 CARD */
.card {
  background: rgba(255,255,255,0.1);
  padding: 12px;
  border-radius: 12px;
  font-size: 12px;
  backdrop-filter: blur(10px);
  animation: fadeIn 0.8s ease forwards;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.1);
  box-shadow: 0 0 25px #a855f7;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* 🔮 POPUP */
.popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  display: none;
  justify-content: center;
  align-items: center;
}

.popup-content {
  background: #120020;
  padding: 20px;
  border-radius: 15px;
  width: 80%;
  max-width: 300px;
  box-shadow: 0 0 30px #a855f7;
  animation: pop 0.3s;
}

@keyframes pop {
  from { transform: scale(0.5); }
  to { transform: scale(1); }
}

button {
  margin-top: 10px;
  padding: 8px;
  border: none;
  background: #a855f7;
  color: white;
  border-radius: 8px;
}

/* 💥 SPARK */
@keyframes spark {
  from { transform: scale(1); opacity: 1; }
  to { transform: scale(3); opacity: 0; }
}

/* 🌀 LOADING */
#loading {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 999;
  font-size: 20px;
  animation: fadeOut 2s forwards;
  animation-delay: 2s;
}

@keyframes fadeOut {
  to { opacity: 0; visibility: hidden; }
}
</style>
</head>

<body>

<div id="loading">🔮 Opening Grimoire...</div>

<img src="https://pngimg.com/uploads/moon/moon_PNG14.png" class="moon">
<img src="https://pngimg.com/uploads/tree/tree_PNG92763.png" class="tree">
<img src="https://pngimg.com/uploads/smoke/smoke_PNG55231.png" class="smoke">

<h1>🔮 8G Grimoire 🔮</h1>

<div class="container" id="list"></div>

<div class="popup" id="popup">
  <div class="popup-content" id="popupContent"></div>
</div>

<!-- 🔊 SUARA MAGIC -->
<audio id="bgm" autoplay loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b0a62.mp3?filename=magic-ambient-11071.mp3" type="audio/mpeg">
</audio>

<script>
const students = ["Adit Andhika Septiawan","Agny Mai Amirat","Alikha Zifara Maharani","Alman Almaulana Putra","Annisa Rania Putri","Arya Ghaussan Ghaillan","Asyifa Eka Faradilla","Ayu Rahmawati","Azzahra Nurfiqriyah","Edelweis Alfatihah Nurislami","Fadly Syahbani","Fajar Agya Ilham","Fathimah Az-Zahra Irawan","Frans Jerrykho Nababan","Gepin Azka","Giovano Putra Firizqi","Ilham Putra Maulana","Jaka Aditya Putra","Kelvin Nugraha","Khairul Rizal","Laisya Zakiyatul Muna","Lusy Gustin Adiyansyah","Meysa Azizah","Muhamad Daffa Khalihur Rahman","Muhamad Faeyza Anwar","Muhamad Rafka Pratama","Muhamad Revan Maulana","Naa'imah Qothrunnadaa","Nayla Almira Pahradia","Nur Cinta Oktaviany","Putri Aira Sofwana Ulya","Repan Muhammad Repando","Revino Faiq Syauki","Rima Silviana","Rina Rahayu","Selvina Anggraeni","Syaakira Kireinisa","Yusbikha Faqih Saputra","Zhilvya Dwina A-Zahra","Zikra Achyar Nurlafi"];

const list = document.getElementById("list");
const popup = document.getElementById("popup");
const content = document.getElementById("popupContent");

students.forEach(name => {
  const div = document.createElement("div");
  div.className = "card";
  div.innerText = name;
  div.onclick = () => showProfile(name);
  list.appendChild(div);
});

function showProfile(name) {
  popup.style.display = "flex";
  content.innerHTML = `
    <h3>${name}</h3>
    <p>🌙 Umur: 13-14</p>
    <p>🧪 Hobi: -</p>
    <button onclick="closePopup()">Tutup</button>
  `;
}

function closePopup() {
  popup.style.display = "none";
}

document.addEventListener("click", function(e) {
  const s = document.createElement("div");
  s.style.position = "fixed";
  s.style.left = e.clientX + "px";
  s.style.top = e.clientY + "px";
  s.style.width = "8px";
  s.style.height = "8px";
  s.style.background = "#a855f7";
  s.style.borderRadius = "50%";
  s.style.boxShadow = "0 0 15px #a855f7";
  s.style.pointerEvents = "none";
  s.style.animation = "spark 0.5s ease-out";
  document.body.appendChild(s);
  setTimeout(() => s.remove(), 500);
});
</script>

</body>
</html>
